<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="A special message for my love ❤️">
<meta property="og:description" content="Click to see a little surprise just for you! You’ll win every challenge 💖">
<meta property="og:image" content="https://i.imgur.com/8Km9tLL.png">
<title>For my love</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffcccc, #ffe6e6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  .card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    max-width: 400px;
    text-align: center;
    position: relative;
    animation: float 3s ease-in-out infinite;
  }
  h1 {
    color: #ff4d6d;
    margin-bottom: 20px;
  }
  p {
    color: #333;
    font-size: 18px;
    line-height: 1.5;
  }
  .heart {
    color: #ff4d6d;
    font-size: 24px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Hey my love ❤️</h1>
  <p>You’ve been so strong through everything. 🌸</p>
  <p>Remember, even on tough days, you’ll always win. <span class="heart">💖</span></p>
  <p>Take a deep breath, smile, and know I’m thinking of you 😊</p>
</div>

<script>
  console.log("%cMy love, you’ve got this! 💪✨", "color: #ff4d6d; font-size: 20px; font-weight: bold;");
</script>
</body>
</html>
